# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# ─────────────────────────────────────────────────────────────────────────────
#  CodeRabbit Configuration for mindfiredigital/ignix-ui
#
#  Stack  : React 18 + TypeScript · Tailwind CSS · Framer Motion · tsup
#  Tooling: pnpm workspaces · Vitest · ESLint · Prettier · tsup
#  Pattern: Component-library + CLI (monorepo-style single package)
#
#  Validate : https://docs.coderabbit.ai/configuration/yaml-validator
#  Reference: https://docs.coderabbit.ai/reference/configuration
# ─────────────────────────────────────────────────────────────────────────────

language: "en-US"

# Reviewer tone – expert but approachable; fits an OSS community project
tone_instructions: >
  You are a senior React + TypeScript engineer specialising in accessible,
  animation-rich UI component libraries. Your reviews are concise, specific,
  and constructive. You always cite the relevant Tailwind CSS, React, or
  TypeScript best-practice when flagging an issue. You praise good patterns
  as well as flagging problems, and you suggest concrete fixes rather than
  vague advice.

early_access: false

# ─────────────────────────────────────────────────────────────────────────────
#  REVIEWS
# ─────────────────────────────────────────────────────────────────────────────
reviews:
  # "assertive" = thorough feedback suitable for a public component library
  # where API surface, accessibility, and bundle size all matter.
  profile: "assertive"

  # Require explicit resolution before auto-approve
  request_changes_workflow: true

  # PR description enrichment
  high_level_summary: true
  high_level_summary_instructions: >
    Summarise the PR as a concise bullet-point list. Group changes by:
    (1) New components or component API changes,
    (2) Bug fixes,
    (3) Tooling / config changes,
    (4) Docs / Storybook updates.
    End with a "Breaking changes" section (write "None" if absent).
  high_level_summary_in_walkthrough: false

  # Walkthrough & diagnostics
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  # Labels – keep in sync with GitHub label set
  suggested_labels: true
  auto_apply_labels: false
  labeling_instructions:
    - label: "component: new"
      instructions: >
        Apply when the PR introduces a brand-new UI component under src/components/.
    - label: "component: enhancement"
      instructions: >
        Apply when the PR extends props, variants, or animation of an existing component.
    - label: "breaking change"
      instructions: >
        Apply when the PR removes or renames exported props/components, or changes
        the component's public API in a backwards-incompatible way.
    - label: "a11y"
      instructions: >
        Apply when the PR touches ARIA attributes, keyboard navigation, focus
        management, or screen-reader behaviour.
    - label: "animation"
      instructions: >
        Apply when the PR adds or modifies Framer Motion variants, transitions,
        or CSS keyframes.
    - label: "tailwind"
      instructions: >
        Apply when the PR introduces new Tailwind utility usage, custom tokens,
        or changes to tailwind.config.ts.
    - label: "cli"
      instructions: >
        Apply when the PR touches src/cli-entry.ts or any CLI scaffolding logic.
    - label: "docs"
      instructions: >
        Apply when the PR only changes documentation, README files, or JSDoc.
    - label: "tests"
      instructions: >
        Apply when the PR adds or modifies Vitest test files (*.test.tsx / *.spec.tsx).
    - label: "build"
      instructions: >
        Apply when the PR changes tsup.config.ts, package.json scripts, or CI workflows.
    - label: "dependencies"
      instructions: >
        Apply when the PR bumps or removes npm/pnpm dependencies.

  # Reviewer suggestions
  suggested_reviewers: true
  auto_assign_reviewers: false

  # Commit status integration
  commit_status: true
  fail_commit_status: false
  review_status: true
  review_details: true

  # Misc display
  poem: false
  in_progress_fortune: false

  # ── Auto-review triggers ────────────────────────────────────────────────────
  auto_review:
    enabled: true
    drafts: false          # Only review when the PR is marked Ready for Review
    base_branches:
      - "main"
      - "develop"
      - "release/**"

  # ── Files to exclude from review ───────────────────────────────────────────
  # (still cloned for context, but CodeRabbit won't comment on them)
  path_filters:
    - "!dist/**"
    - "!dist-cli/**"
    - "!node_modules/**"
    - "!pnpm-lock.yaml"
    - "!package-lock.json"
    - "!yarn.lock"
    - "!**/*.snap"
    - "!**/__snapshots__/**"
    - "!.husky/**"
    - "!coverage/**"
    - "!.turbo/**"
    - "!.next/**"
    - "!storybook-static/**"

  # ── Path-specific review instructions ──────────────────────────────────────
  path_instructions:
    # ── New / modified components ────────────────────────────────────────────
    - path: "src/components/**/*.tsx"
      instructions: |
        ## Component Review Checklist

        ### TypeScript & Props
        - All props must be typed via an exported interface (e.g. `ButtonProps`).
        - Avoid `any`; prefer `unknown` or generics.
        - Default props should use ES default parameters, not `defaultProps`.
        - Discriminated unions are preferred over optional boolean flags where possible.

        ### React Patterns
        - Functional components only (no class components).
        - `React.forwardRef` is required for any component that wraps a DOM element,
          so refs can be forwarded by consumers.
        - Memoisation (`React.memo`, `useMemo`, `useCallback`) should be applied
          only where there is a measurable performance benefit – flag unnecessary usage.
        - Custom hooks that encapsulate complex logic should live in `src/hooks/`.

        ### Tailwind CSS
        - Use `cn()` (or `clsx`/`twMerge`) to merge class lists – never string concatenation.
        - Avoid arbitrary values (e.g. `w-[37px]`) unless they are genuinely design-token-driven.
        - Responsive variants should be mobile-first (`sm:`, `md:`, `lg:`).
        - Dark-mode classes should use the `dark:` prefix – no inline style hacks.

        ### Framer Motion / Animations
        - Animation variants should be defined outside the component (avoid re-creation on each render).
        - Respect `prefers-reduced-motion` via the `useReducedMotion` hook or the
          `motionSafe` / `motionReduce` Tailwind modifiers.
        - Avoid `animate` prop on every re-render; prefer `whileHover`, `whileTap`, or `AnimatePresence`.

        ### Accessibility (a11y)
        - Every interactive element needs a visible focus indicator (`:focus-visible`).
        - Use semantic HTML (e.g. `<button>` not `<div onClick>`).
        - ARIA attributes must be correct (`role`, `aria-label`, `aria-expanded`, etc.).
        - Keyboard navigation must work without a mouse.
        - Color contrast must meet WCAG 2.1 AA (4.5:1 for text, 3:1 for UI components).

        ### Exports & Registry
        - Every new component must be exported from its `index.ts` barrel file.
        - Confirm that `registry.json` has been updated by the scaffold script.

    # ── Component index barrels ───────────────────────────────────────────────
    - path: "src/components/**/index.ts"
      instructions: |
        Verify that:
        1. All public exports from this component directory are re-exported here.
        2. No implementation details (internal sub-components, helper functions) are exported.
        3. Naming is consistent with the component file (PascalCase for components,
           camelCase for hooks, SCREAMING_SNAKE_CASE for constants).

    # ── Test files ────────────────────────────────────────────────────────────
    - path: "src/components/**/*.test.tsx"
      instructions: |
        ## Test Review Checklist (Vitest + Testing Library)

        - Tests must cover: render without crashing, key prop variations, user
          interactions (click, keyboard), and edge cases (empty/null props).
        - Use `@testing-library/user-event` over `fireEvent` for realistic interactions.
        - Prefer `getByRole` queries over `getByTestId` for accessible, semantic assertions.
        - Snapshot tests are acceptable only for highly stable, low-variant components;
          check that the snapshot is meaningful and not overly large.
        - Mock Framer Motion where animation side-effects would cause false failures:
          `vi.mock('framer-motion', ...)`.
        - Each test file should import from the component's public `index.ts` barrel,
          not from the implementation file directly.
        - Aim for ≥ 80 % branch coverage on new components.

    # ── Root component index ──────────────────────────────────────────────────
    - path: "src/index.ts"
      instructions: |
        This is the library's public entry point. Verify:
        - All newly added components are re-exported here.
        - No internal utilities or CLI-only helpers are leaked into this export.
        - Tree-shaking is not broken (named exports only, no wildcard `export *` from
          non-index files).

    # ── CLI entry point ───────────────────────────────────────────────────────
    - path: "src/cli-entry.ts"
      instructions: |
        The CLI bundle must be Node-only (target: node18). Review for:
        - No browser-only APIs (window, document, localStorage).
        - No React imports that would pull in the browser bundle.
        - `chalk`, `ora`, `fs-extra`, `axios`, `@antfu/ni` are the approved
          Node-only dependencies; any addition must be justified.
        - The `#!/usr/bin/env node` shebang must remain at the top of the built output
          (ensured via tsup `banner`).

    # ── tsup build config ─────────────────────────────────────────────────────
    - path: "tsup.config.ts"
      instructions: |
        Review the dual-bundle separation:
        - Browser bundle entry: `src/index.ts` → `dist/`  (platform: browser, external: react, react-dom)
        - CLI bundle entry: `src/cli-entry.ts` → `dist/cli/` (platform: node, target: node18)
        - Ensure `treeshake: true` and `minify: true` are set for the browser bundle.
        - No Node-only packages (chalk, ora, fs-extra, axios) should be in `external` for the browser build.

    # ── Tailwind configuration ─────────────────────────────────────────────────
    - path: "tailwind.config.*"
      instructions: |
        - Design tokens (colours, spacing, font sizes) must use CSS custom properties
          where possible for runtime theme switching.
        - `content` globs must include all TSX/JSX source files so PurgeCSS works correctly.
        - Avoid disabling core plugins unless there is an explicit reason documented in a comment.
        - Any new custom plugin should be documented with a JSDoc comment explaining its purpose.

    # ── TypeScript config ─────────────────────────────────────────────────────
    - path: "tsconfig*.json"
      instructions: |
        - `strict: true` must remain enabled.
        - `moduleResolution` should be `bundler` for the browser build.
        - Paths aliases (`@/*`) must be consistent with tsup and Vite resolver configs.
        - `skipLibCheck: true` is acceptable but flag if `noUncheckedIndexedAccess`
          or `exactOptionalPropertyTypes` are disabled.

    # ── ESLint config ─────────────────────────────────────────────────────────
    - path: "eslint.config.*"
      instructions: |
        - Ensure `plugin:react-hooks/recommended` is included.
        - `no-console` should be set to `warn` or `error` (not `off`).
        - Tailwind class ordering rule (`eslint-plugin-tailwindcss`) should be active.
        - Flag any disabled rules that relate to TypeScript type safety.

    # ── Package manifest ──────────────────────────────────────────────────────
    - path: "package.json"
      instructions: |
        - `exports` map must expose both `.` (browser) and `./cli` (Node) entry points.
        - `peerDependencies` must list `react` and `react-dom` with a broad semver range
          (e.g. `>=17.0.0`).
        - Node-only deps (chalk, ora, fs-extra, etc.) must be in `dependencies` or
          `devDependencies`, NOT in `peerDependencies`.
        - Verify `sideEffects: false` is set (enables tree-shaking).
        - Ensure the `generate-component` script still points to the correct scaffolding file.

    # ── CI / GitHub Actions ───────────────────────────────────────────────────
    - path: ".github/workflows/**"
      instructions: |
        - All workflow steps must pin actions to a specific SHA or version tag (not `@main`).
        - Secrets must be accessed via `${{ secrets.* }}` – no hardcoded values.
        - `pnpm` version must be pinned in `uses: pnpm/action-setup`.
        - Test and lint steps should fail the build on error (`continue-on-error: false`).
        - Ensure a `typecheck` step (`tsc --noEmit`) exists alongside the lint step.

    # ── Documentation & README ────────────────────────────────────────────────
    - path: "**/*.md"
      instructions: |
        - Code examples must be enclosed in fenced code blocks with a language tag.
        - Component prop tables should use Markdown tables and list all props with
          type, default value, and a brief description.
        - Verify links are not broken (relative links must point to existing files).

    # ── Scaffold / code-gen script ────────────────────────────────────────────
    - path: "scripts/**"
      instructions: |
        - The `generate-component` script must produce: `ComponentName.tsx`,
          `ComponentName.test.tsx`, `index.ts`, and update `registry.json`.
        - File naming must follow PascalCase for component files, camelCase for
          utility scripts.
        - Any new script must be added to the `scripts` field in `package.json`.

    # ── Registry ──────────────────────────────────────────────────────────────
    - path: "registry.json"
      instructions: |
        - Every registered component entry must include: `name`, `description`,
          `files` array, and `dependencies` array (can be empty).
        - Component names must be kebab-case and match the directory name under
          `src/components/`.
        - Removing a registry entry without a corresponding code deletion is a
          red flag – flag it for human review.

# ─────────────────────────────────────────────────────────────────────────────
#  CHAT
# ─────────────────────────────────────────────────────────────────────────────
chat:
  auto_reply: true

# ─────────────────────────────────────────────────────────────────────────────
#  KNOWLEDGE BASE
# ─────────────────────────────────────────────────────────────────────────────
knowledge_base:
  opt_out: false

  web_search:
    enabled: true   # Allows CodeRabbit to look up React / Tailwind / a11y specs

  code_guidelines:
    enabled: true
    # Point at the project's own contribution guide if present
    filePatterns:
      - "CONTRIBUTING.md"
      - "docs/**/*.md"

  learnings:
    # "auto" = learn from both PR comments and resolved discussions
    scope: auto

# ─────────────────────────────────────────────────────────────────────────────
#  STATIC ANALYSIS TOOLS
# ─────────────────────────────────────────────────────────────────────────────
tools:
  # ── ESLint ─────────────────────────────────────────────────────────────────
  # CodeRabbit will run ESLint with the project's own eslint.config.* file.
  eslint:
    enabled: true

  # ── Biome (alternative JS/TS linter/formatter) ─────────────────────────────
  # Disabled – project uses ESLint + Prettier, not Biome.
  biome:
    enabled: false

  # ── Markdownlint ───────────────────────────────────────────────────────────
  markdownlint:
    enabled: true

  # ── Actionlint (GitHub Actions YAML linter) ────────────────────────────────
  actionlint:
    enabled: true

  # ── Gitleaks (secret scanning) ─────────────────────────────────────────────
  gitleaks:
    enabled: true

  # ── HTMLHint ───────────────────────────────────────────────────────────────
  htmlhint:
    enabled: true

  # ── Checkov (IaC security scanner) ────────────────────────────────────────
  # Enabled: also scans Dockerfiles and CI workflows for misconfigurations.
  checkov:
    enabled: true

  # ── Language Tool (grammar / prose check) ─────────────────────────────────
  languagetool:
    enabled: true
    # Limit grammar checking to documentation; skip generated or config files.
    enabled_rules:
      - "OXFORD_COMMA"
      - "EN_QUOTES"
      - "COMMA_PARENTHESIS_WHITESPACE"
    disabled_categories:
      - "TYPOGRAPHY"   # too noisy for code-adjacent prose

  # ── YAMLlint ───────────────────────────────────────────────────────────────
  yamllint:
    enabled: true

  # ── ast-grep (AST-based pattern matching) ──────────────────────────────────
  ast-grep:
    essential_rules: true
    # Custom rule packs can be added here as the project grows:
    # rule_dirs:
    #   - ".coderabbit/ast-grep-rules"
